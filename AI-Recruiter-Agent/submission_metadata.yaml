methodology_summary: >
  AI Recruiter Agent ranks candidates for the Redrob Senior AI Engineer JD using a CPU-only scoring pipeline focused on the actual intent of the role, not only keyword overlap. The ranker evaluates title fit, 5–9 years experience alignment, production ML evidence, retrieval/ranking/search/recommendation system experience, embeddings/vector database exposure, evaluation signals such as NDCG/MRR/MAP/A/B testing, location/relocation fit, and Redrob behavioral signals such as recruiter response rate, last activity, open-to-work status, interview completion, GitHub activity, and notice period. It also applies penalties for unrelated roles, weak availability, service-only patterns, and possible honeypot-like inconsistencies. The output is a validated top-100 CSV with candidate_id, rank, score, and profile-grounded reasoning for manual review.
